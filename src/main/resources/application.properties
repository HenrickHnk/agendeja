spring.application.name=agendeja

# SQL Server Configuration
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=agendejadb;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=@ITB123456
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

#JPA Configuration
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect


# Informações

# IntegratedSecurity: (true) Indica qua a conexão será feita com as credenciais do Windows (false) Credencial do SQL Server
# encrypt: (true) Requer criptografia do ciente (false) não requer criptografia do cliente
# trustServerCertificate: (true) Institui o aplicativo cliente a ignorar a validação do certificado SSL/TSL do servidor

# spring.jpa.hibernate.ddl-auto
    # none: Banco de dados e tabelas devem ser criados com antecedência
    # update Banco de dados criado com antecedência, tabelas podem ser criadas com antecedência, as tabelas são atualizadas pelo código (model )
    # create-drop: Banco d dados deve ser criado com antecedência pelo códigp (model), entretetanto as tabelas
    # serão excluidas toda vez que o servidor é "desligado"
    # create: Banco de dados deve ser criado com antecedência, quando o servidor carrega as tabelas são recriadas, as tabelas não serão excluidas
    # quando o servidor é "desligado"


